<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="dns-prefetch" href="https://app.cal.com" />
    <link rel="preconnect" href="https://app.cal.com" crossorigin />
    <!-- Critical above-the-fold paint (matches Tailwind bg-cream / text-ink; fonts load idle via main.tsx) -->
    <style>
      html {
        background-color: #fffefa;
      }
      body {
        margin: 0;
        background-color: #fffefa;
        color: #0f0f0f;
        font-family: system-ui, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      }
      #root {
        min-height: 100dvh;
      }
    </style>
    <!-- LCP hero: responsive preload (Chromium uses imagesrcset / imagesizes) -->
    <link
      rel="preload"
      as="image"
      href="/images/hero-portrait-726.webp"
      imagesrcset="/images/hero-portrait-400.webp 400w, /images/hero-portrait-726.webp 726w, /images/hero-portrait-1088.webp 1088w"
      imagesizes="(max-width: 1024px) min(363px, 100vw), 363px"
      fetchpriority="high"
    />
    <title>Suhanur Rahman — Portfolio</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
